{% if num == '01' or num == '02' or num == '03' or num == '04' or num == '05' or num == '06' %}
<div class="input-group mb-3 form-control text__center">
    <div class="input-group-text text__center">
        <input class="form-check-input mt-0"
               id="month_{{ num }}"
               name="month_{{ num }}"
               type="checkbox"
               value="{{ num }}"
               aria-label="Checkbox for following text input">
    </div>
    <label style="margin-left: 25px; margin-top: 3px;">{{ month }}</label>
</div>
{% endif %}
