{% extends 'main.html' %}
{%load static%}
{% block content %}
<form method="post">
    <h2 class="text__center" xmlns="http://www.w3.org/1999/html">
        Выгрузка месячного отчета по работе ЭШ 6/45
    </h2>
    {% csrf_token %}
    <div class="p-2">
    <select name="month" class="form-select" id="id_months">
        <option name="month" value="None" selected>Выберите месяц...</option>
        {% for key, value in months %}
        <option name="{{ value }}" value="{{ value }}">{{ key }}</option>
        {% endfor %}
    </select>
    </div>
    <button type="submit"
            class="btn btn-outline-warning mt-3 shadow-sm button__width"
            data-bs-dismiss="modal">Месячный отчет

    </button>
</form>
{% endblock %}
